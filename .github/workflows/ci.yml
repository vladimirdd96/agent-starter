name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Typecheck · Lint · Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      # Uncomment when you have tests:
      # - name: Test
      #   run: npm test

      # For database projects — run migrations against a test DB before merging:
      # - name: Migrate
      #   run: npx prisma migrate deploy   # or: supabase db push
      #   env:
      #     DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
